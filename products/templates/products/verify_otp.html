{% extends 'products/base.html' %}

{% block content %}
<section style="padding: 100px 0; background: #fdfaf5; min-height: 80vh;">
    <div class="container" style="max-width: 400px; background: #fff; padding: 40px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.05);">
        <h2 style="font-family: 'Playfair Display'; text-align: center; margin-bottom: 15px;">Verify Phone</h2>
        <p style="text-align: center; color: #666; font-size: 0.9rem; margin-bottom: 30px;">
            We've sent a code to <strong>{{ phone }}</strong>.<br>
            (Check your VS Code terminal!)
        </p>

        {% if error %}
            <p style="color: #d9534f; text-align: center; font-size: 0.85rem; margin-bottom: 20px;">{{ error }}</p>
        {% endif %}

        <form method="POST">
            {% csrf_token %}
            <div style="margin-bottom: 25px;">
                <input type="text" name="otp" placeholder="Enter 4-Digit Code" required 
                       style="width: 100%; padding: 15px; border: 1px solid #ddd; text-align: center; font-size: 1.5rem; letter-spacing: 10px;">
            </div>
            
            <button type="submit" style="width: 100%; padding: 15px; background: #1a1a1a; color: #fff; border: none; font-weight: 600; cursor: pointer; letter-spacing: 2px;">
                VERIFY & SIGN IN
            </button>
        </form>
    </div>
</section>
{% endblock %}
